<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registo Operacional · Delivery Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #050f24; min-height: 100vh; }
  #de-app-root { border-radius: 0 !important; min-height: 100vh !important; }
  #de-app-root {
    --navy: #050f24;
    --panel: #0a1a38;
    --panel-raised: #0e2247;
    --border: #1b2f56;
    --blue: #307ce0;
    --blue-dim: #245da8;
    --blue-glow: rgba(48,124,224,0.14);
    --text: #eaf0fb;
    --text-dim: #8b9dc3;
    --text-faint: #52628c;
    --green: #38c793;
    --red: #ef5a6f;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.18);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.18);
    --shadow-lg: 0 10px 34px rgba(0,0,0,0.24);
    --header-bg: radial-gradient(ellipse at top left, rgba(48,124,224,0.16), transparent 55%), linear-gradient(180deg, var(--panel-raised), var(--panel));
    --hero-bg: radial-gradient(ellipse at top left, rgba(48,124,224,0.22), transparent 60%), linear-gradient(135deg, var(--panel-raised), var(--panel));
    --card-bg: linear-gradient(180deg, rgba(14,34,71,0.5), rgba(10,26,56,0.5)), var(--panel);
    --input-bg: var(--navy);
    --row-hover: rgba(48,124,224,0.05);
    --logo-chip-bg: #ffffff;
    --table-border: rgba(27,47,86,0.5);
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;

    background: var(--navy);
    color: var(--text);
    font-family: var(--font-ui);
    border-radius: 12px;
    overflow: hidden;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    transition: background .25s ease, color .25s ease;
  }
  #de-app-root[data-theme="light"] {
    --navy: #eef2fa;
    --panel: #ffffff;
    --panel-raised: #ffffff;
    --border: #dbe3f2;
    --blue: #2266cc;
    --blue-dim: #17509e;
    --blue-glow: rgba(34,102,204,0.10);
    --text: #0d1b33;
    --text-dim: #46567a;
    --text-faint: #7788a8;
    --green: #0f9d63;
    --red: #d42d4c;
    --shadow-sm: 0 2px 10px rgba(30,60,120,0.07);
    --shadow-md: 0 6px 20px rgba(30,60,120,0.09);
    --shadow-lg: 0 14px 38px rgba(30,60,120,0.14);
    --header-bg: linear-gradient(180deg, #ffffff, #f4f8ff);
    --hero-bg: radial-gradient(ellipse at top left, rgba(34,102,204,0.10), transparent 60%), linear-gradient(135deg, #ffffff, #eef4ff);
    --card-bg: #ffffff;
    --input-bg: #f5f8fd;
    --row-hover: rgba(34,102,204,0.045);
    --logo-chip-bg: #ffffff;
    --table-border: rgba(219,227,242,0.9);
  }
  #de-app-root * { box-sizing: border-box; }
  #de-app-root, #de-app-root * { transition: background-color .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease; }

  .de-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    background: var(--header-bg);
    flex-wrap: wrap; gap: 10px;
  }
  .de-brand { display: flex; align-items: center; gap: 12px; }
  .de-brand .logo-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--blue), var(--blue-dim));
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: #fff; letter-spacing: -0.5px;
    box-shadow: 0 0 0 1px rgba(47,125,250,0.35), 0 6px 18px rgba(47,125,250,0.3);
  }
  .de-brand .mark { color: #fff; font-weight: 800; letter-spacing: 0.03em; font-size: 15.5px; }
  .de-brand .logo-chip {
    background: #fff; border-radius: 11px; padding: 10px 18px; display: flex; align-items: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3), 0 0 0 4px var(--blue-glow); border: 1px solid var(--border);
    height: 60px;
  }
  .de-brand .logo-chip img { height: 40px; width: auto; display: block; }
  .de-brand-divider { width: 1px; height: 38px; background: linear-gradient(180deg, transparent, var(--border), transparent); }
  .de-brand-title { display: flex; flex-direction: column; gap: 3px; }
  .de-title-line {
    font-size: 15px; font-weight: 800; letter-spacing: 0.03em; color: var(--text);
    display: flex; align-items: center; gap: 7px;
  }
  .de-title-dot { color: var(--blue); font-weight: 900; }
  .de-brand .sub { color: var(--blue); font-size: 10.5px; font-weight: 700; font-family: var(--font-mono); letter-spacing: 0.14em; margin-top: 0; }

  .de-tabs { display: flex; gap: 4px; background: var(--navy); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
  .de-tab {
    padding: 8px 16px; font-size: 13px; font-weight: 700; color: var(--text-dim);
    background: transparent; border: none; border-radius: 7px; cursor: pointer;
    transition: all .15s ease; font-family: var(--font-ui);
  }
  .de-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .de-tab.active { background: linear-gradient(135deg, var(--blue), var(--blue-dim)); color: #fff; box-shadow: 0 3px 10px rgba(47,125,250,0.35); }

  .de-body { flex: 1; overflow-y: auto; padding: 22px; }
  .de-body > div { animation: deFadeIn .28s ease; }
  @keyframes deFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .de-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 18px; }
  .de-field { display: flex; flex-direction: column; gap: 6px; min-width: 170px; }
  .de-field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .de-rename-btn {
    background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 11px;
    padding: 0; line-height: 1; opacity: 0.6; transition: opacity .15s, color .15s;
  }
  .de-rename-btn:hover { opacity: 1; color: var(--blue); }
  .de-field select, .de-field input[type="date"], .de-field input[type="text"], .de-field input[type="number"] {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 9px 10px; border-radius: 7px; font-size: 14px; font-family: var(--font-ui);
    outline: none; transition: border-color .15s;
  }
  .de-field select:focus, .de-field input:focus { border-color: var(--blue); }
  .de-field input[type="number"] { font-family: var(--font-mono); }

  .de-btn {
    background: linear-gradient(135deg, var(--blue), var(--blue-dim)); color: #fff; border: none; padding: 10px 18px;
    border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: var(--font-ui);
    transition: all .15s; box-shadow: 0 3px 10px rgba(47,125,250,0.25);
  }
  .de-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(47,125,250,0.35); }
  .de-btn.ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); font-weight: 600; box-shadow: none; }
  .de-btn.ghost:hover { color: var(--text); border-color: var(--blue-dim); transform: none; box-shadow: none; }
  .de-btn.danger { background: transparent; color: var(--red); border: 1px solid rgba(239,90,111,0.4); font-weight: 600; padding: 6px 10px; font-size: 12px; box-shadow: none; }
  .de-btn.danger:hover { background: rgba(239,90,111,0.08); transform: none; }
  .de-btn.small { padding: 6px 12px; font-size: 12px; }
  .de-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  .de-card {
    background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 16px;
    box-shadow: var(--shadow-md);
    transition: border-color .2s ease;
  }
  .de-card h3 {
    margin: 0 0 14px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--blue); font-weight: 800;
    display: flex; align-items: center; gap: 8px;
  }
  .de-card h3::before {
    content: ''; width: 3px; height: 13px; background: var(--blue); border-radius: 2px; display: inline-block;
  }

  .de-status { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600; font-family: var(--font-mono); }
  .de-status.new { background: var(--blue-glow); color: var(--blue); }
  .de-status.saved { background: rgba(56,199,147,0.14); color: var(--green); }
  .de-status.inactive { background: rgba(239,90,111,0.12); color: var(--red); }

  .de-grid-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }

  table.de-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.de-table th {
    text-align: left; padding: 9px 10px; color: var(--text-faint); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); font-weight: 700;
  }
  table.de-table td { padding: 8px 10px; border-bottom: 1px solid var(--table-border); transition: background .12s; }
  table.de-table tbody tr:hover td { background: var(--row-hover); }
  table.de-table tr:last-child td { border-bottom: none; }
  table.de-table input[type="number"], table.de-table input[type="text"] {
    width: 100%; background: var(--navy); border: 1px solid var(--border); color: var(--text);
    padding: 6px 8px; border-radius: 6px; font-family: var(--font-mono); font-size: 13px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  table.de-table input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  table.de-table .ent-name { color: var(--text); font-weight: 700; white-space: nowrap; }
  table.de-table .ent-loja { color: var(--text-faint); font-size: 11px; font-weight: 400; }
  table.de-table .computed-val { font-family: var(--font-mono); color: var(--green); font-weight: 700; }

  .de-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .de-kpi {
    position: relative; overflow: hidden;
    background: linear-gradient(155deg, var(--panel-raised) 0%, var(--panel) 100%);
    border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px;
    box-shadow: var(--shadow-md);
    transition: transform .15s ease, border-color .15s ease;
  }
  .de-kpi:hover { transform: translateY(-2px); border-color: var(--blue-dim); }
  .de-kpi::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
    background: linear-gradient(90deg, var(--blue), transparent);
  }
  .de-kpi .label { font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; margin-bottom: 8px; }
  .de-kpi .value { font-family: var(--font-mono); font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
  .de-kpi .value.blue { color: var(--blue); }
  .de-kpi .value.green { color: var(--green); }
  .de-kpi .value.red { color: var(--red); }
  .de-kpi .delta { font-size: 11px; margin-top: 4px; font-family: var(--font-mono); font-weight: 700; }
  .de-kpi .delta.up { color: var(--green); }
  .de-kpi .delta.down { color: var(--red); }

  .de-hero {
    border-radius: 14px; padding: 22px 26px; margin-bottom: 22px; position: relative; overflow: hidden;
    background: var(--hero-bg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
  }
  .de-hero-top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 16px; flex-wrap:wrap; gap:8px; }
  .de-hero-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--blue); font-weight: 800; }
  .de-hero-sub { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }
  .de-hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
  .de-hero-stat .n { font-family: var(--font-mono); font-size: 30px; font-weight: 800; color: var(--text); line-height: 1; letter-spacing:-0.02em; }
  .de-hero-stat .l { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-top: 6px; font-weight: 700; }

  .de-empty { text-align: center; padding: 40px 20px; color: var(--text-faint); }
  .de-empty .big { font-size: 32px; margin-bottom: 8px; }

  .de-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .de-badge.active { background: rgba(56,199,147,0.14); color: var(--green); }
  .de-badge.inactive { background: rgba(82,98,140,0.2); color: var(--text-faint); }

  .de-op-list-item {
    display: flex; align-items: center; justify-content: space-between; padding: 13px 16px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
    cursor: pointer; transition: all .15s; box-shadow: var(--shadow-sm);
  }
  .de-op-list-item:hover { border-color: var(--blue-dim); transform: translateX(2px); }
  .de-op-list-item .name { font-weight: 700; font-size: 14px; }
  .de-op-list-item .meta { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); margin-top: 3px; }

  .de-config-editor { border-top: 1px solid var(--border); margin-top: 14px; padding-top: 14px; }
  .de-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .de-tag {
    display: flex; align-items: center; gap: 6px; background: var(--navy); border: 1px solid var(--border);
    padding: 5px 6px 5px 10px; border-radius: 20px; font-size: 12px;
  }
  .de-tag button { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 13px; line-height: 1; padding: 2px; }
  .de-tag button:hover { color: var(--red); }
  .de-inline-add { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .de-inline-add input { flex: 1; min-width: 140px; }

  .de-loading { display: flex; align-items: center; justify-content: center; height: 300px; color: var(--text-faint); font-family: var(--font-mono); font-size: 13px; }

  .de-toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--panel-raised); border: 1px solid var(--blue);
    color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 100; opacity: 0; transform: translateY(10px);
    transition: all .25s ease; pointer-events: none; max-width: 320px;
  }
  .de-toast.show { opacity: 1; transform: translateY(0); }

  .de-section-label { font-size: 12px; color: var(--text-dim); font-weight: 600; margin: 16px 0 8px 0; }
  .de-note { font-size: 12px; color: var(--text-faint); line-height: 1.5; }
  .de-chart-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 16px; }
  .de-flex-between { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }

  /* Fecho do dia banner */
  .de-fecho {
    border-radius: 12px; padding: 18px 22px; margin-bottom: 18px;
    background: linear-gradient(135deg, var(--blue-dim), var(--blue));
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    box-shadow: 0 8px 30px rgba(47,125,250,0.25);
  }
  .de-fecho .fecho-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.8); font-weight: 700; margin-bottom: 4px; }
  .de-fecho .fecho-op { font-size: 16px; font-weight: 700; color: #fff; }
  .de-fecho .fecho-stats { display: flex; gap: 26px; flex-wrap: wrap; }
  .de-fecho .fecho-stat { text-align: right; }
  .de-fecho .fecho-stat .n { font-family: var(--font-mono); font-size: 26px; font-weight: 800; color: #fff; line-height:1; }
  .de-fecho .fecho-stat .l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.75); margin-top: 4px; font-weight: 700; }

  .de-subtabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .de-subtab {
    padding: 7px 16px; font-size: 12px; font-weight: 700; border-radius: 22px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--border); color: var(--text-dim); transition: all .15s;
  }
  .de-subtab:hover { color: var(--text); border-color: var(--blue-dim); }
  .de-subtab.active { background: linear-gradient(135deg, var(--blue-glow), rgba(47,125,250,0.08)); border-color: var(--blue); color: var(--blue); }

  .de-trend-badge { font-family: var(--font-mono); font-weight: 700; font-size: 12px; padding: 3px 8px; border-radius: 6px; }
  .de-trend-badge.up { color: var(--green); background: rgba(56,199,147,0.12); }
  .de-trend-badge.down { color: var(--red); background: rgba(239,90,111,0.12); }
  .de-trend-badge.flat { color: var(--text-faint); background: rgba(82,98,140,0.12); }
  .edr-bad { color: var(--red) !important; font-weight: 800; }
  .edr-mid { color: #d99a1c !important; font-weight: 800; }
  .edr-good { color: var(--green) !important; font-weight: 800; }
  .de-theme-toggle {
    width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm);
    transition: all .2s;
  }
  .de-theme-toggle:hover { border-color: var(--blue-dim); transform: translateY(-1px); }
  .de-header-right { display: flex; align-items: center; gap: 10px; }
  .de-live-clock {
    font-family: var(--font-mono); font-size: 11.5px; color: var(--text-faint); font-weight: 600;
    padding: 8px 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: var(--shadow-sm); white-space: nowrap;
  }
  .de-conn-status {
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    padding: 8px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: var(--shadow-sm); white-space: nowrap;
  }
</style>
</head>
<body>

<div id="de-app-root">

let valueLabelsRegistered = false;
const valueLabelsPlugin = {
  id: 'deValueLabels',
  afterDatasetsDraw(chart){
    const {ctx} = chart;
    chart.data.datasets.forEach((dataset, dsIndex)=>{
      const meta = chart.getDatasetMeta(dsIndex);
      if (meta.hidden || dataset.hideLabels) return;
      const isLine = meta.type === 'line';
      meta.data.forEach((element, index)=>{
        const value = dataset.data[index];
        if (value===null || value===undefined) return;
        let label;
        if (dataset.labelSuffix === '%') label = (Math.round(value*10)/10) + '%';
        else label = Number.isInteger(value) ? String(value) : (Math.round(value*10)/10).toString();
        ctx.save();
        ctx.font = '700 10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = isLine ? (dataset.borderColor || chartGreen()) : chartLabelText();
        const pos = element.tooltipPosition ? element.tooltipPosition() : element.getCenterPoint();
        ctx.textBaseline = isLine ? 'bottom' : 'bottom';
        const offset = isLine ? 8 : 6;
        ctx.fillText(label, pos.x, pos.y - offset);
        ctx.restore();
      });
    });
  }
};

// Safe chart creation: never let a missing/slow Chart.js library block the app.
// Retries briefly, then falls back to a plain message instead of hanging.
function safeChart(canvasId, config, retriesLeft){
  retriesLeft = retriesLeft===undefined ? 25 : retriesLeft;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  if (typeof Chart === 'undefined'){
    if (retriesLeft > 0){
      setTimeout(()=>safeChart(canvasId, config, retriesLeft-1), 200);
    } else {
      const p = document.createElement('div');
      p.style.cssText = 'color:var(--text-faint);font-size:12px;padding:20px;text-align:center;';
      p.textContent = 'Gráfico indisponível (não foi possível carregar a biblioteca de gráficos — verifica a ligação à internet).';
      canvas.replaceWith(p);
    }
    return null;
  }
  try {
    if (!valueLabelsRegistered){
      Chart.register(valueLabelsPlugin);
      valueLabelsRegistered = true;
    }
    config.options = config.options || {};
    config.options.layout = config.options.layout || { padding: { top: 18 } };
    const chart = new Chart(canvas.getContext('2d'), config);
    chartInstances.push(chart);
    return chart;
  } catch(e){
    console.error('chart error', e);
    return null;
  }
}

// ============================================================
// FIREBASE FIRESTORE — armazenamento partilhado real
// ------------------------------------------------------------
// Estrutura:
//   appdata/config    -> { operations, importFlags, updatedAt }
//   records/{opId}    -> { entries: { "2026-07-16": {...} }, updatedAt }
//   auditLog/{autoId} -> { ts, user, action, details }
// Sincronização em tempo real via onSnapshot — qualquer pessoa a
// abrir o site vê as alterações de outra pessoa em poucos segundos,
// sem precisar de recarregar a página.
// ============================================================
function setConnStatus(ok){
  const el = document.getElementById('de-conn-status');
  if (!el) return;
  el.textContent = ok ? '🟢 Sincronizado' : '🔴 Sem ligação';
  el.title = ok ? 'Ligado ao Firebase — dados partilhados com a equipa' : 'Sem ligação ao Firebase — os dados podem não estar a guardar';
}

function isEditingNow(){
  const active = document.activeElement;
  const root = document.getElementById('de-app-root');
  return !!(active && root && root.contains(active) && (active.tagName==='INPUT' || active.tagName==='TEXTAREA' || active.isContentEditable));
}

async function saveOperations(ops){
  STATE.operations = ops;
  try {
    await db.collection('appdata').doc('config').set({
      operations: ops,
      importFlags: STATE.importFlags || {},
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    setConnStatus(true);
    ensureAllOpsHaveRecordsListener();
    return true;
  } catch(e){
    console.error('saveOperations falhou', e);
    setConnStatus(false);
    toast('⚠️ Não foi possível guardar — verifica a ligação à internet');
    return false;
  }
}

async function saveRecords(opId, records){
  STATE.recordsCache[opId] = records;
  try {
    await db.collection('records').doc(opId).set({
      entries: records,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setConnStatus(true);
    return true;
  } catch(e){
    console.error('saveRecords falhou', e);
    setConnStatus(false);
    toast('⚠️ Não foi possível guardar — verifica a ligação à internet');
    return false;
  }
}

async function saveImportFlag(flag){
  STATE.importFlags = flag;
  try {
    await db.collection('appdata').doc('config').set({
      importFlags: flag,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    return true;
  } catch(e){
    console.error('saveImportFlag falhou', e);
    return false;
  }
}

async function logEdit(action, details){
  try {
    const user = await getUserName();
    await db.collection('auditLog').add({
      ts: new Date().toISOString(),
      user, action, details: details || ''
    });
  } catch(e){ console.error('log edit falhou', e); }
}

// ---------- Escutas em tempo real ----------
const _recordsListeners = {};

function ensureAllOpsHaveRecordsListener(){
  STATE.operations.forEach(op=>{
    if (_recordsListeners[op.id]) return;
    _recordsListeners[op.id] = db.collection('records').doc(op.id).onSnapshot(doc=>{
      STATE.recordsCache[op.id] = doc.exists ? (doc.data().entries || {}) : {};
      setConnStatus(true);
      if (!isEditingNow()) render();
    }, err=>{
      console.error('listener de registos falhou', op.id, err);
      setConnStatus(false);
    });
  });
}

function setupRealtimeListeners(){
  db.collection('appdata').doc('config').onSnapshot(doc=>{
    if (doc.exists){
      const data = doc.data();
      STATE.operations = migrateOperations(data.operations && data.operations.length ? data.operations : defaultOperations());
      STATE.importFlags = data.importFlags || {};
    }
    ensureAllOpsHaveRecordsListener();
    setConnStatus(true);
    if (!isEditingNow()) render();
  }, err=>{
    console.error('listener de configuração falhou', err);
    setConnStatus(false);
  });

  db.collection('auditLog').orderBy('ts','desc').limit(300).onSnapshot(snap=>{
    STATE.auditLog = snap.docs.map(d=>d.data()).reverse();
    if (!isEditingNow() && STATE.tab==='historico') render();
  }, err=>{
    console.error('listener de histórico falhou', err);
  });
}

function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmt(n){
  if (n===null||n===undefined||isNaN(n)) return '—';
  return Math.round(n*100)/100 === Math.round(n) ? String(Math.round(n)) : (Math.round(n*10)/10).toString();
}
function pct(n){
  if (n===null||n===undefined||isNaN(n)) return '—';
  return (Math.round(n*1000)/10) + '%';
}
function edrHtml(edrFraction){
  // verde >= 95%, amarelo entre 90% e 95%, vermelho < 90% — usado em toda a app
  if (edrFraction===null || edrFraction===undefined || isNaN(edrFraction)) return '—';
  const cls = edrFraction < 0.9 ? 'edr-bad' : edrFraction < 0.95 ? 'edr-mid' : 'edr-good';
  return `<span class="${cls}">${pct(edrFraction)}</span>`;
}
function toast(msg){
  const el = document.getElementById('de-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(STATE.toastTimer);
  STATE.toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}
function slug(str){
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}
function uid(){ return Math.random().toString(36).slice(2,9); }
function cssEscape(str){
  if (typeof CSS !== 'undefined' && CSS.escape) return CSS.escape(str);
  return String(str).replace(/[^a-zA-Z0-9_\u00C0-\u024F -]/g, c=>'\\'+c);
}
function monthName(m){
  return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][m-1];
}
function sectorYearOptions(){
  const currentYear = new Date().getFullYear();
  const years = new Set([2026, currentYear, currentYear+1]);
  return Array.from(years).sort();
}

// AGGREGATION HELPERS
// ============================================================
function sumRoleForDate(op, dayRecord, role){
  if (!dayRecord) return 0;
  let entitySum = 0, hasEntityData = false;
  if (op.repeating){
    const entities = dayRecord.entities || {};
    op.repeating.fields.forEach(f=>{
      if (f.role===role){
        Object.keys(entities).forEach(ent=>{
          const v = entities[ent] && entities[ent][f.key];
          if (v !== undefined && v !== null && v !== '') { entitySum += Number(v) || 0; hasEntityData = true; }
        });
      }
    });
  }
  if (hasEntityData) return entitySum;
  let fixedSum = 0;
  (op.fields||[]).forEach(f=>{
    if (f.role===role) fixedSum += Number(dayRecord.fixed && dayRecord.fixed[f.key]) || 0;
  });
  return fixedSum;
}
function dayEntregues(op, rec){ return sumRoleForDate(op, rec, 'entregues'); }
function dayTotal(op, rec){
  const t = sumRoleForDate(op, rec, 'total');
  if (t) return t;
  const e = sumRoleForDate(op, rec, 'entregues');
  const n = sumRoleForDate(op, rec, 'nao_entregues');
  return e+n;
}
function dateRangeArray(days){
  const arr = [];
  const end = new Date();
  for (let i=days-1;i>=0;i--){
    const d = new Date(end);
    d.setDate(d.getDate()-i);
    arr.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  }
  return arr;
}
function daysInMonth(year, month){
  return new Date(year, month, 0).getDate();
}
function allDatesForMonth(year, month){
  const n = daysInMonth(year, month);
  const arr = [];
  for (let d=1; d<=n; d++){
    arr.push(year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  }
  return arr;
}
function weekdayName(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][d.getDay()];
}

          });

  banner.innerHTML = `
    <div>
      <div class="fecho-title">Fecho do dia</div>
      <div class="fecho-op">${op.name} · ${registoSel.date.split('-').reverse().join('/')}</div>
    </div>
    <div class="fecho-stats">
      <div class="fecho-stat"><div class="n" id="fecho-entregues">${fmt(entregues)}</div><div class="l">Entregues</div></div>
      <div class="fecho-stat"><div class="n" id="fecho-total">${total? fmt(total):'—'}</div><div class="l">Total</div></div>
      <div class="fecho-stat"><div class="n" id="fecho-edr">${edr!==null?edrHtml(edr):'—'}</div><div class="l">EDR%</div></div>
    </div>
  `;
  return banner;
}

function recomputeFecho(op, wrap){
  const fixedVals = {}, entityVals = {};
  wrap.querySelectorAll('[data-fixed-key]').forEach(inp=>{ fixedVals[inp.dataset.fixedKey] = inp.value; });
  wrap.querySelectorAll('[data-entity]').forEach(inp=>{
    entityVals[inp.dataset.entity] = entityVals[inp.dataset.entity] || {};
    entityVals[inp.dataset.entity][inp.dataset.entityKey] = inp.value;
  });
  const old = document.getElementById('fecho-banner');
  const fresh = renderFechoBanner(op, fixedVals, entityVals);
  if (old) old.replaceWith(fresh);
}

function renderRegisto(){
  const body = document.getElementById('de-body');
  const activeOps = STATE.operations.filter(o=>o.active).sort((a,b)=>a.name.localeCompare(b.name));
  if ((!registoSel.opId || !activeOps.some(o=>o.id===registoSel.opId)) && activeOps.length) registoSel.opId = activeOps[0].id;

  const wrap = document.createElement('div');

  const row = document.createElement('div');
  row.className = 'de-row';
  row.style.cssText = 'background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow-md);margin-bottom:18px;';
  row.innerHTML = `
    <div class="de-field">
      <label>Cliente / Operação</label>
      <select id="reg-op"></select>
    </div>
    <div class="de-field">
      <label>Data</label>
      <input type="date" id="reg-date" value="${registoSel.date}" max="${todayISO()}" />
    </div>
    <div id="reg-status-holder"></div>
    <button class="de-btn ghost small" id="reg-edit-op" style="margin-left:auto;">⚙ Editar campos desta operação</button>
  `;
  wrap.appendChild(row);

  const opSelect = row.querySelector('#reg-op');
  activeOps.forEach(o=>{
    const opt = document.createElement('option');
    opt.value = o.id; opt.textContent = o.name;
    if (o.id===registoSel.opId) opt.selected = true;
    opSelect.appendChild(opt);
  });
  opSelect.onchange = ()=>{ registoSel.opId = opSelect.value; render(); };
  row.querySelector('#reg-date').onchange = (e)=>{ registoSel.date = e.target.value; render(); };
  row.querySelector('#reg-edit-op').onclick = ()=>{
    configExpanded = registoSel.opId;
    STATE.tab = 'config';
    render();
  };

  const op = STATE.operations.find(o=>o.id===registoSel.opId);
  if (!op){
    wrap.innerHTML += `<div class="de-empty"><div class="big">📭</div>Nenhuma operação ativa. Configure uma em "Configurações".</div>`;
    body.innerHTML=''; body.appendChild(wrap);
    return;
  }

  const records = STATE.recordsCache[op.id] || {};
  const existing = records[registoSel.date];
  const statusHolder = wrap.querySelector('#reg-status-holder');
  const isFalta = existing && existing.noOperation;
  const hasRealData = existing && !isFalta && (Object.keys(existing.fixed||{}).length || Object.values(existing.entities||{}).some(ev=>Object.keys(ev||{}).length));
  statusHolder.innerHTML = `<span class="de-status ${isFalta?'inactive':existing?'saved':'new'}">${isFalta?'📭 marcado como sem operação':existing?'já tem registo — a editar':'ainda sem registo'}</span>
    <button class="de-btn ghost small" id="reg-mark-falta" style="margin-left:8px;">${isFalta?'✕ Desmarcar':'📭 Marcar sem operação hoje'}</button>
    ${existing ? `<button class="de-btn danger" id="reg-delete-record" style="margin-left:8px;">🗑 Apagar este registo permanentemente</button>` : ''}`;
  statusHolder.querySelector('#reg-mark-falta').onclick = async ()=>{
    const recs = STATE.recordsCache[op.id] || (STATE.recordsCache[op.id] = {});
    if (isFalta){
      delete recs[registoSel.date];
    } else {
      if (hasRealData){
        if (!confirm('Já há números registados neste dia. Marcar como "sem operação" vai substituir esse registo. Continuar?')) return;
      }
      recs[registoSel.date] = { fixed:{}, entities:{}, motorista:'', noOperation:true };
    }
    await saveRecords(op.id, recs);
    delete registoDrafts[draftKey()];
    await logEdit(isFalta ? 'Desmarcou sem operação' : 'Marcou sem operação', op.name + ' — ' + registoSel.date);
    toast(isFalta ? 'Desmarcado' : 'Dia marcado como sem operação');
    render();
  };
  const deleteBtn = statusHolder.querySelector('#reg-delete-record');
  if (deleteBtn){
    deleteBtn.onclick = async ()=>{
      const dataSummary = `Entregues ${fmt(dayEntregues(op, existing))} · Total ${fmt(dayTotal(op, existing))}`;
      const typed = prompt(`Vais apagar PERMANENTEMENTE o registo de ${op.name} — ${registoSel.date.split('-').reverse().join('/')} (${dataSummary}).\n\nEsta ação não pode ser desfeita. Escreve APAGAR para confirmar:`);
      if (typed !== 'APAGAR') { if (typed !== null) toast('Não confirmado — nada foi apagado'); return; }
      const recs = STATE.recordsCache[op.id] || (STATE.recordsCache[op.id] = {});
      delete recs[registoSel.date];
      await saveRecords(op.id, recs);
      delete registoDrafts[draftKey()];
      await logEdit('🗑 Apagou registo permanentemente', op.name + ' — ' + registoSel.date + ' (' + dataSummary + ')');
      toast('Registo apagado permanentemente');
      render();
    };
  }

  const missingDays = computeMissingDays(op);
  if (missingDays.length){
    const alertBox = document.createElement('div');
    alertBox.style.cssText = 'background:rgba(239,90,111,0.1);border:1px solid var(--red);border-radius:10px;padding:12px 16px;margin-bottom:16px;';
    function missingEntitiesForDay(d){
      if (!op.repeating) return [];
      const rec = records[d];
      const absences = (rec && rec.absences) || {};
      const entities = (rec && rec.entities) || {};
      return op.repeating.entities.filter(ent=>{
        if (absences[ent]) return false;
        const ev = entities[ent];
        return !ev || !Object.keys(ev).length;
      });
    }
    alertBox.innerHTML = `
      <div style="font-size:13px;color:var(--text);margin-bottom:8px;">⚠️ <strong style="color:var(--red);">${missingDays.length} dia(s)</strong> sem registo completo em ${op.name} este mês${op.repeating?' — passa o rato num dia para ver quem falta':''}:</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${missingDays.map(d=>{
          const missingEnts = missingEntitiesForDay(d);
          const title = missingEnts.length ? `Faltam: ${missingEnts.join(', ')}` : '';
          return `<button class="de-btn ghost small" data-goto-missing="${d}" title="${title}" style="border-color:var(--red);color:var(--red);">${d.split('-').reverse().join('/')}</button>`;
        }).join('')}
      </div>
    `;
    wrap.appendChild(alertBox);
    setTimeout(()=>{
      alertBox.querySelectorAll('[data-goto-missing]').forEach(btn=>{
        btn.onclick = ()=>{ registoSel.date = btn.dataset.gotoMissing; render(); };
      });
    },0);
  }

  const draft = registoDrafts[draftKey()];
  const formVals = draft
    ? { fixed: {...draft.fixed}, entities: JSON.parse(JSON.stringify(draft.entities||{})), motorista: draft.motorista||'', absences: {...(draft.absences||{})} }
    : { fixed: {...(existing?existing.fixed:{})}, entities: JSON.parse(JSON.stringify(existing?existing.entities:{})), motorista: existing?existing.motorista:'', absences: {...(existing?existing.absences:{})} };

  wrap.appendChild(renderFechoBanner(op, formVals.fixed, formVals.entities));

  if (existing && lastSavedVerify && lastSavedVerify.opId===op.id && lastSavedVerify.date===registoSel.date){
    const savedEnt = dayEntregues(op, existing);
    const savedTotal = dayTotal(op, existing);
    const verifyBox = document.createElement('div');
    verifyBox.style.cssText = 'background:rgba(56,199,147,0.1);border:1px solid var(--green);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;';
    verifyBox.innerHTML = `
      <div style="font-size:13px;color:var(--text);">✓ Gravado no Firebase: <strong style="color:var(--green);">Entregues ${fmt(savedEnt)}</strong> · <strong style="color:var(--green);">Total ${fmt(savedTotal)}</strong> para ${registoSel.date.split('-').reverse().join('/')}</div>
      <button class="de-btn small" id="reg-goto-analises">Ver isto nas Análises →</button>
    `;
    wrap.appendChild(verifyBox);
    setTimeout(()=>{
      const b = document.getElementById('reg-goto-analises');
      if (b) b.onclick = ()=>{
        STATE.tab = 'analises';
        analisesSel.subtab = 'cliente';
        analisesSel.opId = op.id;
        render();
      };
    },0);
  }

  if (op.driverField && op.driverField.enabled){
    const card = document.createElement('div');
    card.className = 'de-card';
    card.innerHTML = `<h3>🧑‍✈️ Motorista responsável</h3>`;
    const dRow = document.createElement('div');
    dRow.className = 'de-row';
    dRow.style.marginBottom = '0';
    const list = op.driverField.list || [];
    dRow.innerHTML = `
      <div class="de-field" style="min-width:220px;">
        <label>Motorista</label>
        <select id="reg-motorista">
          <option value="">— não especificado —</option>
          ${list.map(m=>`<option value="${m}" ${formVals.motorista===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="de-field">
        <label>Ou adicionar novo</label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="reg-motorista-new" placeholder="nome do motorista…" style="width:160px;" />
          <button class="de-btn ghost small" id="reg-motorista-add">+ Adicionar</button>
        </div>
      </div>
    `;
    card.appendChild(dRow);
    wrap.appendChild(card);
  }

  const derivedRoles = new Set((op.repeating ? op.repeating.fields : []).filter(f=>f.role).map(f=>f.role));

  function computeDerivedTotal(role){
    let total = 0, hasEntityData = false;
    if (op.repeating){
      op.repeating.fields.forEach(f=>{
        if (f.role===role){
          Object.values(formVals.entities).forEach(ev=>{
            const v = ev && ev[f.key];
            if (v !== undefined && v !== null && v !== '') { total += Number(v) || 0; hasEntityData = true; }
          });
        }
      });
    }
    if (hasEntityData) return total;
    let fixedTotal = 0;
    (op.fields||[]).forEach(f=>{ if (f.role===role) fixedTotal += Number(formVals.fixed[f.key]) || 0; });
    return fixedTotal;
  }

  const editableFixed = (op.fields||[]).filter(f=>!derivedRoles.has(f.role));
  const derivedFixed = (op.fields||[]).filter(f=>derivedRoles.has(f.role));
  if ((op.fields && op.fields.length) || !op.repeating){
    const card = document.createElement('div');
    card.className = 'de-card';
    card.innerHTML = `<h3>📦 Números do dia</h3>`;
    const grid = document.createElement('div');
    grid.className = 'de-grid-fields';
    editableFixed.forEach(f=>{
      const fdiv = document.createElement('div');
      fdiv.className = 'de-field';
      fdiv.innerHTML = `<label>${f.label} <button class="de-rename-btn" data-rename-field="${f.key}" title="Renomear campo">✎</button></label><input type="number" min="0" step="1" data-fixed-key="${f.key}" value="${formVals.fixed[f.key] ?? ''}" placeholder="0" />`;
      grid.appendChild(fdiv);
    });
    derivedFixed.forEach(f=>{
      const fdiv = document.createElement('div');
      fdiv.className = 'de-field';
      fdiv.innerHTML = `<label>${f.label} <button class="de-rename-btn" data-rename-field="${f.key}" title="Renomear campo">✎</button> <span style="color:var(--blue);font-weight:700;">(soma automática)</span></label>
        <div data-derived-fixed="${f.key}" data-derived-role="${f.role}" style="font-family:var(--font-mono);font-size:20px;font-weight:800;color:var(--green);padding:9px 0;">${fmt(computeDerivedTotal(f.role))}</div>`;
      grid.appendChild(fdiv);
    });
    card.appendChild(grid);
    card.querySelectorAll('[data-rename-field]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.preventDefault();
        const f = op.fields.find(x=>x.key===btn.dataset.renameField);
        if (!f) return;
        const novo = prompt('Novo nome para o campo:', f.label);
        if (!novo || !novo.trim()) return;
        f.label = novo.trim();
        await saveOperations(STATE.operations);
        await logEdit('Renomeou campo', op.name + ' → ' + novo.trim());
        toast('Campo renomeado');
        render();
      };
    });
    if (!op.repeating){
      const enableBtn = document.createElement('button');
      enableBtn.className = 'de-btn ghost small';
      enableBtn.style.marginTop = '14px';
      enableBtn.textContent = '+ Ativar registo por motorista (soma o total automaticamente)';
      enableBtn.onclick = async ()=>{
        const rolesToMigrate = ['entregues','total','nao_entregues'];
        const migrated = (op.fields||[]).filter(f=>rolesToMigrate.includes(f.role));
        const repFields = migrated.length ? migrated.map(f=>({key:f.key, label:f.label, role:f.role}))
          : [{ key:'entregas', label:'Entregas', role:'entregues' }];
        op.repeating = { entityLabel:'Motorista', entities:[], entityMeta:{}, fields: repFields };
        const carryOver = {};
        repFields.forEach(f=>{
          const v = Number(formVals.fixed[f.key]);
          if (v) carryOver[f.key] = v;
        });
        if (Object.keys(carryOver).length){
          op.repeating.entities.push('Motorista 1');
          registoDrafts[draftKey()] = registoDrafts[draftKey()] || { fixed:{}, entities:{}, motorista:'' };
          registoDrafts[draftKey()].entities['Motorista 1'] = carryOver;
        }
        await saveOperations(STATE.operations);
        await logEdit('Ativou registo por motorista', op.name);
        toast('Registo por motorista ativado para '+op.name);
        render();
      };
      card.appendChild(enableBtn);
    }
    wrap.appendChild(card);
  }

  if (op.repeating){
    const card = document.createElement('div');
    card.className = 'de-card';
    const hasLojas = Object.values(op.repeating.entityMeta||{}).some(m=>m && m.loja);
    card.innerHTML = `
      <div class="de-flex-between" style="margin-bottom:0;">
        <h3 style="margin-bottom:0;">🚚 ${op.repeating.entityLabel==='Motorista' ? 'Por motorista' : 'Por '+op.repeating.entityLabel.toLowerCase()}</h3>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <input type="text" id="quick-add-entity" placeholder="novo ${op.repeating.entityLabel.toLowerCase()}…" style="background:var(--navy);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;" />
          <button class="de-btn ghost small" id="quick-add-entity-btn">+ Adicionar</button>
          <button class="de-btn ghost small" id="reg-disable-repeating" title="Voltar a registar um número único, sem separar por motorista">↩ Voltar para número único</button>
        </div>
      </div>
    `;
    const table = document.createElement('table');
    table.className = 'de-table';
    const hasTotalField = op.repeating.fields.some(f=>f.role==='total');
    const hasEntreguesField = op.repeating.fields.some(f=>f.role==='entregues');
    const hasNaoEntreguesField = op.repeating.fields.some(f=>f.role==='nao_entregues');
    const showComputed = hasEntreguesField && (hasTotalField || hasNaoEntreguesField);
    const showDerivedNaoEnt = hasEntreguesField && hasTotalField && !hasNaoEntreguesField;
    const historicalOnly = Object.keys(formVals.entities).filter(e=>!op.repeating.entities.includes(e) && Object.keys(formVals.entities[e]||{}).length);
    const displayEntities = [...op.repeating.entities, ...historicalOnly];
    table.innerHTML = `<thead><tr>
        <th>${op.repeating.entityLabel}</th>
        ${hasLojas?'<th>Loja</th>':''}
        ${op.repeating.fields.map(f=>`<th>${f.label}</th>`).join('')}
        ${showDerivedNaoEnt?'<th>Não Entregues</th>':''}
        ${showComputed?'<th>EDR%</th>':''}
        <th>Faltou</th>
        <th></th>
      </tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');
    displayEntities.forEach(ent=>{
      const isHistorical = historicalOnly.includes(ent);
      const isAbsent = !!formVals.absences[ent];
      const tr = document.createElement('tr');
      if (isHistorical) tr.style.opacity = '0.6';
      if (isAbsent) tr.style.opacity = '0.55';
      const evals = formVals.entities[ent] || {};
      const meta = (op.repeating.entityMeta||{})[ent] || {};
      let tds = `<td class="ent-name">${ent}${isHistorical?' <span class="de-badge inactive" style="margin-left:4px;">antigo</span>':' <button class="de-rename-btn" data-rename-entity="'+ent+'" title="Renomear">✎</button>'}</td>`;
      if (hasLojas) tds += `<td class="ent-loja">${meta.loja||'—'} ${isHistorical?'':'<button class="de-rename-btn" data-rename-loja="'+ent+'" title="Editar loja">✎</button>'}</td>`;
      op.repeating.fields.forEach(f=>{
        tds += `<td><input type="number" min="0" step="1" data-entity="${ent}" data-entity-key="${f.key}" value="${evals[f.key] ?? ''}" placeholder="0" ${isAbsent?'disabled':''} /></td>`;
      });
      if (showDerivedNaoEnt){
        tds += `<td class="computed-val" data-naoent-for="${ent}">—</td>`;
      }
      if (showComputed){
        tds += `<td class="computed-val" data-computed-for="${ent}">—</td>`;
      }
      tds += `<td style="text-align:center;"><input type="checkbox" data-absent-entity="${ent}" ${isAbsent?'checked':''} title="Marcar que ${ent} faltou hoje" /></td>`;
      tds += `<td><button class="de-btn danger" data-quick-remove-entity="${ent}" title="Remover ${ent} da lista ativa (dados históricos mantidos)">✕</button> <button class="de-btn danger" data-wipe-entity-reg="${ent}" title="Apagar PERMANENTEMENTE os dados registados desta entidade">🗑</button></td>`;
      tr.innerHTML = tds;
      tbody.appendChild(tr);
    });
    card.appendChild(table);
    if (!displayEntities.length){
      const empty = document.createElement('div');
      empty.className = 'de-note';
      empty.style.marginTop = '10px';
      empty.textContent = 'Ainda sem ' + op.repeating.entityLabel.toLowerCase() + 's cadastrados — adiciona acima.';
      card.appendChild(empty);
    }
    wrap.appendChild(card);

    card.querySelector('#quick-add-entity-btn').onclick = async ()=>{
      const val = card.querySelector('#quick-add-entity').value.trim();
      if (!val) return;
      op.repeating.entities.push(val);
      await saveOperations(STATE.operations);
      await logEdit('Adicionou '+op.repeating.entityLabel.toLowerCase(), op.name + ' — ' + val);
      toast(`${op.repeating.entityLabel} adicionado: ${val}`);
      render();
    };
    card.querySelector('#reg-disable-repeating').onclick = async ()=>{
      if (!confirm(`Voltar "${op.name}" para registo de número único? Os registos por ${op.repeating.entityLabel.toLowerCase()} já guardados continuam no histórico e a contar nas Análises — só o formulário de hoje em diante muda.`)) return;
      const carry = {};
      op.fields.forEach(f=>{
        if (derivedRoles.has(f.role)){
          let total = 0;
          op.repeating.fields.forEach(rf=>{
            if (rf.role===f.role) Object.values(formVals.entities).forEach(ev=>{ total += Number(ev[rf.key])||0; });
          });
          if (total) carry[f.key] = total;
        }
      });
      op.repeating = null;
      if (Object.keys(carry).length){
        registoDrafts[draftKey()] = registoDrafts[draftKey()] || { fixed:{}, entities:{}, motorista:'' };
        Object.assign(registoDrafts[draftKey()].fixed, carry);
      }
      await saveOperations(STATE.operations);
      await logEdit('Desativou registo por motorista', op.name);
      toast('Voltou para registo de número único em '+op.name);
      render();
    };
    card.querySelectorAll('[data-quick-remove-entity]').forEach(btn=>{
      btn.onclick = async ()=>{
        const name = btn.dataset.quickRemoveEntity;
        if (!confirm(`Remover "${name}" de ${op.name}? Os registos históricos deste ${op.repeating.entityLabel.toLowerCase()} não são apagados, só deixa de aparecer para novos registos. Para apagar os dados de vez, usa o botão 🗑 ao lado.`)) return;
        const idx = op.repeating.entities.indexOf(name);
        if (idx>-1) op.repeating.entities.splice(idx,1);
        if (op.repeating.entityMeta) delete op.repeating.entityMeta[name];
        await saveOperations(STATE.operations);
        await logEdit('Removeu '+op.repeating.entityLabel.toLowerCase(), op.name + ' — ' + name);
        toast(`${name} removido da lista ativa`);
        render();
      };
    });
    card.querySelectorAll('[data-wipe-entity-reg]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const entityName = btn.dataset.wipeEntityReg;
        const [selYear, selMonth] = registoSel.date.split('-').map(Number);
        const monthStart = selYear+'-'+String(selMonth).padStart(2,'0')+'-01';
        const monthEnd = selYear+'-'+String(selMonth).padStart(2,'0')+'-'+String(daysInMonth(selYear, selMonth)).padStart(2,'0');
        const from = prompt(`Apagar PERMANENTEMENTE os dados de "${entityName}" (${op.name}) a partir de que data? (AAAA-MM-DD)`, monthStart);
        if (!from) return;
        const to = prompt(`Até que data (inclusive)? (AAAA-MM-DD)`, monthEnd);
        if (!to) return;
        const recs = STATE.recordsCache[op.id] || {};
        const affectedDates = Object.keys(recs).filter(d=>d>=from && d<=to && recs[d] && recs[d].entities && recs[d].entities[entityName] && Object.keys(recs[d].entities[entityName]).length);
        if (!affectedDates.length){
          toast('Não há dados registados para "'+entityName+'" nesse intervalo');
          return;
        }
        const typed = prompt(`Isto vai apagar PERMANENTEMENTE os dados de "${entityName}" em ${affectedDates.length} dia(s), entre ${from} e ${to}, na operação "${op.name}". Esta ação não pode ser desfeita.\n\nEscreve APAGAR para confirmar:`);
        if (typed !== 'APAGAR'){ toast('Não confirmado — nada foi apagado'); return; }
        affectedDates.forEach(d=>{
          delete recs[d].entities[entityName];
          delete registoDrafts[op.id+'|'+d];
        });
        await saveRecords(op.id, recs);
        await logEdit('🗑 Apagou dados de entidade (Registo)', op.name + ' — "' + entityName + '" — ' + affectedDates.length + ' dia(s) entre ' + from + ' e ' + to);
        toast(`Dados de "${entityName}" apagados em ${affectedDates.length} dia(s)`);
        render();
      };
    });
    card.querySelectorAll('[data-rename-entity]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.preventDefault();
        const oldName = btn.dataset.renameEntity;
        const novo = prompt(`Novo nome para "${oldName}":`, oldName);
        if (!novo || !novo.trim() || novo.trim()===oldName) return;
        const idx = op.repeating.entities.indexOf(oldName);
        if (idx>-1) op.repeating.entities[idx] = novo.trim();
        if (op.repeating.entityMeta && op.repeating.entityMeta[oldName]){
          op.repeating.entityMeta[novo.trim()] = op.repeating.entityMeta[oldName];
          delete op.repeating.entityMeta[oldName];
        }
        await saveOperations(STATE.operations);
        await logEdit('Renomeou '+op.repeating.entityLabel.toLowerCase(), op.name + ' — ' + oldName + ' → ' + novo.trim());
        toast(`Renomeado para ${novo.trim()} — os registos anteriores continuam guardados com o nome antigo`);
        render();
      };
    });
    card.querySelectorAll('[data-rename-loja]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.preventDefault();
        const ent = btn.dataset.renameLoja;
        if (!op.repeating.entityMeta) op.repeating.entityMeta = {};
        const atual = (op.repeating.entityMeta[ent]||{}).loja || '';
        const novo = prompt(`Loja de "${ent}":`, atual);
        if (novo===null) return;
        op.repeating.entityMeta[ent] = op.repeating.entityMeta[ent] || {};
        op.repeating.entityMeta[ent].loja = novo.trim();
        await saveOperations(STATE.operations);
        await logEdit('Editou loja', op.name + ' — ' + ent + ' → ' + novo.trim());
        toast('Loja atualizada');
        render();
      };
    });

    function recomputeRow(ent){
      const totalField = op.repeating.fields.find(f=>f.role==='total');
      const entField = op.repeating.fields.find(f=>f.role==='entregues');
      const naoEntField = op.repeating.fields.find(f=>f.role==='nao_entregues');
      if (!entField) return;
      const entInput = table.querySelector(`input[data-entity="${cssEscape(ent)}"][data-entity-key="${entField.key}"]`);
      const e = Number(entInput.value)||0;
      let t = 0;
      if (totalField){
        const totalInput = table.querySelector(`input[data-entity="${cssEscape(ent)}"][data-entity-key="${totalField.key}"]`);
        t = Number(totalInput.value)||0;
      } else if (naoEntField){
        const naoInput = table.querySelector(`input[data-entity="${cssEscape(ent)}"][data-entity-key="${naoEntField.key}"]`);
        t = e + (Number(naoInput.value)||0);
      }
      const edrCell = table.querySelector(`[data-computed-for="${cssEscape(ent)}"]`);
      if (edrCell) edrCell.innerHTML = t>0 ? edrHtml(e/t) : '—';
      const naoEntCell = table.querySelector(`[data-naoent-for="${cssEscape(ent)}"]`);
      if (naoEntCell) naoEntCell.textContent = t>0 ? fmt(Math.max(0,t-e)) : '—';
    }
    if (showComputed){
      displayEntities.forEach(recomputeRow);
      table.addEventListener('input', (e)=>{
        if (e.target.dataset.entity) recomputeRow(e.target.dataset.entity);
      });
    }
  }

  const saveRow = document.createElement('div');
  saveRow.style.cssText = 'margin-top:22px; position:sticky; bottom:0; padding:14px 0 4px 0; background:linear-gradient(180deg, transparent, var(--navy) 30%);';
  saveRow.innerHTML = `<button class="de-btn" id="reg-save" style="width:100%; padding:14px; font-size:14.5px; letter-spacing:0.02em;">✓ Guardar registo</button>`;
  wrap.appendChild(saveRow);

  body.innerHTML = '';
  body.appendChild(wrap);

  function captureDraft(){
    const d = { fixed:{}, entities:{}, motorista:'', absences:{} };
    wrap.querySelectorAll('[data-fixed-key]').forEach(inp=>{ if (inp.value !== '') d.fixed[inp.dataset.fixedKey] = inp.value; });
    if (op.repeating){
      wrap.querySelectorAll('[data-entity]').forEach(inp=>{
        d.entities[inp.dataset.entity] = d.entities[inp.dataset.entity] || {};
        if (inp.value !== '') d.entities[inp.dataset.entity][inp.dataset.entityKey] = inp.value;
      });
      wrap.querySelectorAll('[data-absent-entity]:checked').forEach(cb=>{ d.absences[cb.dataset.absentEntity] = true; });
    }
    const motoristaSel = document.getElementById('reg-motorista');
    if (motoristaSel) d.motorista = motoristaSel.value;
    registoDrafts[draftKey()] = d;
  }
  wrap.querySelectorAll('[data-absent-entity]').forEach(cb=>{
    cb.onchange = ()=>{
      const ent = cb.dataset.absentEntity;
      const inputs = wrap.querySelectorAll(`[data-entity="${cssEscape(ent)}"]`);
      inputs.forEach(inp=>{ inp.disabled = cb.checked; if (cb.checked) inp.value=''; });
      const tr = cb.closest('tr');
      if (tr) tr.style.opacity = cb.checked ? '0.55' : '1';
      recomputeFecho(op, wrap);
      recomputeDerivedFixed();
      captureDraft();
    };
  });
  function recomputeDerivedFixed(){
    wrap.querySelectorAll('[data-derived-fixed]').forEach(box=>{
      const role = box.dataset.derivedRole;
      let total = 0;
      if (op.repeating){
        op.repeating.fields.forEach(f=>{
          if (f.role===role){
            wrap.querySelectorAll(`[data-entity-key="${f.key}"]`).forEach(inp=>{ total += Number(inp.value) || 0; });
          }
        });
      }
      box.textContent = fmt(total);
    });
  }
  wrap.addEventListener('input', (e)=>{
    if (e.target.dataset.fixedKey || e.target.dataset.entity){
      recomputeFecho(op, wrap);
      recomputeDerivedFixed();
      captureDraft();
    }
  });
  wrap.addEventListener('change', (e)=>{
    if (e.target.id === 'reg-motorista') captureDraft();
  });

  if (op.driverField && op.driverField.enabled){
    document.getElementById('reg-motorista-add').onclick = async ()=>{
      const val = document.getElementById('reg-motorista-new').value.trim();
      if (!val) return;
      op.driverField.list.push(val);
      await saveOperations(STATE.operations);
      await logEdit('Adicionou motorista à lista', op.name + ' — ' + val);
      toast('Motorista adicionado: '+val);
      render();
    };
  }

  document.getElementById('reg-save').onclick = async ()=>{
    const record = { fixed:{}, entities:{}, motorista: '', absences: {} };
    wrap.querySelectorAll('[data-fixed-key]').forEach(inp=>{
      if (inp.value !== '') record.fixed[inp.dataset.fixedKey] = Number(inp.value);
    });
    if (op.repeating){
      wrap.querySelectorAll('[data-absent-entity]:checked').forEach(cb=>{ record.absences[cb.dataset.absentEntity] = true; });
      const histOnly = Object.keys(formVals.entities).filter(e=>!op.repeating.entities.includes(e));
      [...op.repeating.entities, ...histOnly].forEach(ent=>{ record.entities[ent] = {}; });
      wrap.querySelectorAll('[data-entity]').forEach(inp=>{
        if (inp.value !== '') record.entities[inp.dataset.entity][inp.dataset.entityKey] = Number(inp.value);
      });
      derivedFixed.forEach(f=>{
        let total = 0, hasData = false;
        op.repeating.fields.forEach(rf=>{
          if (rf.role===f.role){
            Object.values(record.entities).forEach(ev=>{
              if (ev[rf.key] !== undefined){ total += Number(ev[rf.key]) || 0; hasData = true; }
            });
          }
        });
        record.fixed[f.key] = hasData ? total : (Number(formVals.fixed[f.key]) || 0);
      });
    }
    if (op.driverField && op.driverField.enabled){
      const sel = document.getElementById('reg-motorista');
      record.motorista = sel ? sel.value : '';
    }
    const recs = STATE.recordsCache[op.id] || (STATE.recordsCache[op.id] = {});
    recs[registoSel.date] = record;
    const btn = document.getElementById('reg-save');
    btn.textContent = 'A guardar…'; btn.disabled = true;
    await saveRecords(op.id, recs);
    delete registoDrafts[draftKey()];
    btn.textContent = 'Guardar registo'; btn.disabled = false;
    const savedEntregues = dayEntregues(op, record);
    const savedTotal = dayTotal(op, record);
    await logEdit('Registo guardado', op.name + ' — ' + registoSel.date + ' — Entregues: ' + fmt(savedEntregues) + ' · Total: ' + fmt(savedTotal));
    toast(`Guardado: ${op.name} — ${registoSel.date} — Entregues: ${fmt(savedEntregues)} · Total: ${fmt(savedTotal)}`);
    lastSavedVerify = { opId: op.id, date: registoSel.date };
    render();
  };
}

let analisesSel = { subtab:'mensal', opId:'all', year:2026, month: new Date().getMonth()+1, sectorPeriod:'mes' };

function destroyCharts(){ chartInstances.forEach(c=>c.destroy()); chartInstances = []; }

function computeOpDayStats(op, dateStr){
  const records = STATE.recordsCache[op.id] || {};
  const rec = records[dateStr];
  if (!rec || rec.noOperation) return null;
  const entregues = dayEntregues(op, rec);
  const total = dayTotal(op, rec);
  return { entregues, total, edr: total>0? entregues/total : null };
}

function computeOpRangeStats(op, dates){
  let entregues=0, total=0, diasComRegisto=0;
  dates.forEach(d=>{
    const s = computeOpDayStats(op, d);
    if (s){ entregues += s.entregues; total += s.total; diasComRegisto++; }
  });
  return { entregues, total, diasComRegisto, edr: total>0? entregues/total : null, mediaEntregues: diasComRegisto>0? entregues/diasComRegisto : null };
}

function computeMissingDays(op){
  const records = STATE.recordsCache[op.id] || {};
  const workDays = op.workDays || [0,1,2,3,4,5,6];
  const today = new Date();
  const year = today.getFullYear(), month = today.getMonth()+1;
  const yesterdayISO = (()=>{ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  const allDays = allDatesForMonth(year, month).filter(d=>d<=yesterdayISO);
  const missing = [];
  allDays.forEach(d=>{
    const dow = new Date(d+'T00:00:00').getDay();
    if (!workDays.includes(dow)) return;
    const rec = records[d];
    if (rec && rec.noOperation) return;
    if (op.repeating && op.repeating.entities.length){
      const absences = (rec && rec.absences) || {};
      const entities = (rec && rec.entities) || {};
      const incomplete = op.repeating.entities.some(ent=>{
        if (absences[ent]) return false;
        const ev = entities[ent];
        return !ev || !Object.keys(ev).length;
      });
      if (incomplete) missing.push(d);
    } else {
      const hasData = rec && Object.keys(rec.fixed||{}).length;
      if (!hasData) missing.push(d);
    }
  });
  return missing;
}
